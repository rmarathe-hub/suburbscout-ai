name: suburbscout-hosted
description: >
  SuburbScout — Massachusetts suburb recommendation agent (Agent Framework tools + suburbs dataset).
metadata:
  tags:
    - SuburbScout
    - Agent Framework
    - Responses Protocol
template:
  name: suburbscout-hosted
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: DATABASE_URL
      value: "{{DATABASE_URL}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
